name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  appstore-package:
    name: Build appstore package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Build app
        run: make build

      - name: Build appstore tarball
        run: make appstore

      - name: Generate checksum
        run: |
          cd build/artifacts/appstore
          sha256sum timetracker.tar.gz > timetracker.tar.gz.sha256

      - name: Upload app package
        uses: actions/upload-artifact@v7
        with:
          name: timetracker-appstore-package
          path: |
            build/artifacts/appstore/timetracker.tar.gz
            build/artifacts/appstore/timetracker.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Publish GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'Nextcloud app package for %s.\n\nDownload `timetracker.tar.gz` and extract it into your Nextcloud apps directory.\n' "$GITHUB_REF_NAME" > release-notes.md
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              build/artifacts/appstore/timetracker.tar.gz \
              build/artifacts/appstore/timetracker.tar.gz.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/artifacts/appstore/timetracker.tar.gz \
              build/artifacts/appstore/timetracker.tar.gz.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md \
              --verify-tag
          fi
